<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surebet Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/calculator.css">
</head>
<body>

  <!-- Auth Page -->
  <div id="auth-page" class="auth-container">
    <div class="auth-card">
      <div style="text-align:center;margin-bottom:8px;font-size:36px;">&#9917;</div>
      <h1 class="auth-title">Surebet Manager</h1>
      <p class="auth-subtitle" id="auth-subtitle">Entre para gerenciar suas operações</p>

      <form id="auth-form">
        <div id="register-field" class="form-group" style="display:none">
          <label class="form-label">Nome de exibição</label>
          <input type="text" class="form-input" id="auth-display-name" placeholder="Seu nome">
        </div>
        <div class="form-group">
          <label class="form-label">Usuário</label>
          <input type="text" class="form-input" id="auth-username" placeholder="seu_usuario" required>
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <input type="password" class="form-input" id="auth-password" placeholder="********" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px" id="auth-btn">Entrar</button>
      </form>

      <div class="auth-divider">ou</div>

      <button class="btn-discord" id="discord-login-btn" onclick="loginWithDiscord()">
        <svg width="20" height="15" viewBox="0 0 71 55" fill="currentColor"><path d="M60.1 4.9A58.5 58.5 0 0045.4.2a.2.2 0 00-.2.1 40.8 40.8 0 00-1.8 3.7 54 54 0 00-16.2 0A26.5 26.5 0 0025.4.3a.2.2 0 00-.2-.1A58.4 58.4 0 0010.5 5a.2.2 0 00-.1 0C1.5 18 -.9 30.6.3 43a.2.2 0 00.1.2A58.7 58.7 0 0018 54.7a.2.2 0 00.3-.1 42 42 0 003.6-5.9.2.2 0 00-.1-.3 38.6 38.6 0 01-5.5-2.6.2.2 0 01 0-.4l1.1-.9a.2.2 0 01.2 0 41.9 41.9 0 0035.6 0 .2.2 0 01.2 0l1.1.9a.2.2 0 010 .3 36.2 36.2 0 01-5.5 2.7.2.2 0 00-.1.3 47.2 47.2 0 003.6 5.8.2.2 0 00.3.1A58.5 58.5 0 0070.6 43.2a.2.2 0 00.1-.1c1.4-14.7-2.4-27.5-10.2-38.8a.2.2 0 00-.1 0zM23.7 35.6c-3.4 0-6.1-3.1-6.1-6.9s2.7-6.9 6.1-6.9 6.2 3.1 6.1 6.9c0 3.8-2.7 6.9-6.1 6.9zm22.6 0c-3.4 0-6.1-3.1-6.1-6.9s2.7-6.9 6.1-6.9 6.2 3.1 6.1 6.9c0 3.8-2.7 6.9-6.1 6.9z"/></svg>
        Entrar com Discord
      </button>

      <div class="auth-switch">
        <span id="auth-switch-text">Não tem conta?</span>
        <a id="auth-switch-link" onclick="toggleAuthMode()">Criar conta</a>
      </div>

      <div id="auth-error" style="color:var(--danger);text-align:center;margin-top:12px;font-size:13px;display:none"></div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="app" style="display:none">

    <!-- Mobile header -->
    <div class="mobile-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()">&#9776;</button>
      <span style="font-weight:700;color:var(--primary)">Surebet Manager</span>
      <div style="width:24px"></div>
    </div>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <span>&#9917;</span> Surebet Manager
      </div>
      <p class="sidebar-subtitle">Gerenciamento de apostas</p>

      <div class="nav-section">Principal</div>
      <a class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a class="nav-item" data-page="new-operation" onclick="navigate('new-operation')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Nova Operação
      </a>
      <a class="nav-item" data-page="history" onclick="navigate('history')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Histórico
      </a>

      <a class="nav-item" data-page="ranking" onclick="navigate('ranking')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Ranking
      </a>

      <div class="nav-section">Ferramentas</div>
      <a class="nav-item" data-page="calculator" onclick="navigate('calculator')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="16" y2="18"/></svg>
        Calculadora
      </a>
      <a class="nav-item" data-page="freebets" onclick="navigate('freebets')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V8H6a2 2 0 0 1 0-4h12v4"/><path d="M4 6v12a2 2 0 0 0 2 2h14v-4"/><path d="M18 12a2 2 0 0 0 0 4h4v-4h-4z"/></svg>
        Freebets
      </a>
      <a class="nav-item" data-page="watcher" onclick="navigate('watcher')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <span>Watcher</span>
        <span class="watcher-badge" id="watcher-badge" style="display:none">0</span>
      </a>

      <div class="nav-section">Config</div>
      <a class="nav-item" data-page="settings" onclick="navigate('settings')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        Configurações
      </a>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="user-avatar">U</div>
          <span class="user-name" id="user-name">Usuário</span>
        </div>
        <button class="btn-logout" onclick="logout()" title="Sair">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </nav>

    <!-- Content area -->
    <main class="main-content" id="main-content"></main>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Edit Operation Modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Editar Operação</h3>
        <button class="modal-close" onclick="closeEditModal()">&times;</button>
      </div>
      <form id="edit-form">
        <input type="hidden" id="edit-id">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Tipo</label>
            <select class="form-select" id="edit-type">
              <option value="aquecimento">Aquecimento/Clube</option>
              <option value="arbitragem">Arbitragem</option>
              <option value="aumentada25">Aumentada 25%</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Jogo/Evento</label>
            <input type="text" class="form-input" id="edit-game">
          </div>
          <div class="form-group">
            <label class="form-label">Data do evento</label>
            <input type="date" class="form-input" id="edit-event-date">
          </div>
          <div class="form-group">
            <label class="form-label">Resultado</label>
            <select class="form-select" id="edit-result">
              <option value="pending">Pendente</option>
              <option value="bet365_won">Bet365 Ganhou</option>
              <option value="poly_won">Polymarket Ganhou</option>
              <option value="void">Anulado</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Stake Bet365 Total (R$)</label>
            <input type="number" step="0.01" class="form-input" id="edit-stake-bet365">
          </div>
          <div class="form-group">
            <label class="form-label">Odd Bet365</label>
            <input type="number" step="0.01" class="form-input" id="edit-odd-bet365">
          </div>
          <div class="form-group">
            <label class="form-label">Stake Polymarket (USD)</label>
            <input type="number" step="0.01" class="form-input" id="edit-stake-poly-usd">
          </div>
          <div class="form-group">
            <label class="form-label">Odd Polymarket</label>
            <input type="number" step="0.01" class="form-input" id="edit-odd-poly">
          </div>
          <div class="form-group">
            <label class="form-label">Cotação USD/BRL</label>
            <input type="number" step="0.0001" class="form-input" id="edit-exchange-rate">
          </div>
          <div class="form-group">
            <label class="form-label">Lucro (R$)</label>
            <input type="number" step="0.01" class="form-input" id="edit-profit">
          </div>
          <div class="form-group full">
            <div id="edit-auto-profit-info" style="display:none;font-size:12px;margin-bottom:4px"></div>
          </div>
          <div class="form-group full">
            <label class="form-label">Contas Utilizadas</label>
            <div id="edit-accounts-list" class="accounts-checklist"></div>
          </div>
          <div class="form-group full">
            <label class="form-label">Notas</label>
            <textarea class="form-textarea" id="edit-notes"></textarea>
          </div>
          <div class="form-group full">
            <label class="form-label">Tags</label>
            <div class="tags-input-wrap" id="edit-tags"></div>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeEditModal()">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
